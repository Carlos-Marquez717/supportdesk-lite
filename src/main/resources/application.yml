spring:
  application:
    name: supportdesk-lite
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supportdesk_lite}
    username: ${DB_USERNAME:supportdesk}
    password: ${DB_PASSWORD:supportdesk}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
